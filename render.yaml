services:
  - type: web
    name: davomat-django
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py load_sheet_data && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        sync: false
      - key: DATABASE_URL
        sync: false